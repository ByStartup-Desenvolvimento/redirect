<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltando ao aplicativo...</title>
</head>

<body style="font-family:sans-serif;text-align:center;padding:60px 20px;background:#f5f5f5;">
    <h2 style="color:#333;">Voltando ao aplicativo...</h2>
    <p style="color:#666;">Se nao for redirecionado automaticamente:</p>
    <a id="btnApp" href="#"
        style="display:inline-block;margin:16px;padding:14px 32px;background:#FDDF01;color:#333;text-decoration:none;border-radius:8px;font-size:16px;font-weight:bold;">Abrir
        o App Mundo Real</a>
    <script>
        var params = new URLSearchParams(window.location.search);
        var orderId = params.get("order_id") || "";
        var status = params.get("status") || "approved";
        var targetPath = (status === "approved" || status === "success")
            ? "(protected)/order-feedback?orderId=" + orderId
            : "(protected)/awaiting-payment?orderId=" + orderId;
        var intentUrl = "intent://" + targetPath + "#Intent;scheme=mundo-real;package=com.bystartup.mundoreal;end";
        var deepLink = "mundo-real://" + targetPath;
        document.getElementById("btnApp").href = deepLink;
        try { window.location.href = intentUrl; } catch (e) { }
        setTimeout(function () { window.location.href = deepLink; }, 800);
    </script>
</body>

</html>
