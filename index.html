<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltando ao aplicativo...</title>
</head>

<body style="font-family:sans-serif;text-align:center;padding:60px 20px;background:#f5f5f5;">
    <h2 style="color:#333;">Voltando ao aplicativo...</h2>
    <p style="color:#666;">Se não for redirecionado automaticamente, clique no botão:</p>
    <a id="btnApp" href="#"
        style="display:inline-block;margin:16px;padding:14px 32px;background:#FDDF01;color:#333;text-decoration:none;border-radius:8px;font-size:16px;font-weight:bold;">
        Abrir o App Mundo Real
    </a>
    <script>
        var params = new URLSearchParams(window.location.search);
        var orderId = params.get("order_id") || "";
        var status = params.get("status") || "approved";
        var preferenceId = params.get("preference_id") || "";

        var targetPath = (status === "approved" || status === "success")
            ? "order-feedback?orderId=" + orderId
            : "awaiting-payment?orderId=" + orderId;

        if (status !== "approved" && status !== "success" && preferenceId) {
            var checkoutUrl = "https://www.mercadopago.com.br/checkout/v1/redirect?pref_id=" + preferenceId;
            targetPath += "&checkoutUrl=" + encodeURIComponent(checkoutUrl);
        }

        var isAndroid = /Android/i.test(navigator.userAgent);
        var intentUrl = "intent://" + targetPath + "#Intent;scheme=mundo-real;package=com.bystartup.mundoreal;end";
        var deepLink = "mundo-real://";
       // Define o link diretamente no href do botão HTML
        var btnApp = document.getElementById("btnApp");
        if (isAndroid) {
            btnApp.href = intentUrl;
        } else {
            var btn = document.getElementById("btnApp");
            btn.style.background = "#e0e0e0";
            btn.style.color = "#666";
            btn.innerText = "Toque no ✓ no topo esquerdo para voltar";
            // Desativa a ação do link
            btn.href = "javascript:void(0)";
        }
        // Tentativa de redirecionamento automático
         // Tentativa de redirecionamento automático (Apenas para Android)
        if (isAndroid) {
            function abrirAppAutomatico() {
                window.location.href = intentUrl;
            }
            setTimeout(abrirAppAutomatico, 300);
        }
    </script>
</body>

</html>
